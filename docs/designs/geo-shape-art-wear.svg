<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <pattern id="geo-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="50" height="50" fill="#3498db"/>
      <polygon points="50,0 100,50 50,100 0,50" fill="#f1c40f"/>
      <circle cx="25" cy="25" r="10" fill="#e74c3c"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="400" height="400" fill="url(#geo-pattern)"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#e74c3c" stroke-width="10"/>
  <text x="200" y="220" font-size="40" text-anchor="middle" fill="#f1c40f">Geo Shape Art Wear</text>
  <text x="200" y="260" font-size="20" text-anchor="middle" fill="#f1c40f">形状艺术</text>
