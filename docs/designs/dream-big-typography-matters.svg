<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <style>
    .font1 { font-family: 'Montserrat', sans-serif; font-size: 24px; }
    .font2 { font-family: 'Merriweather', serif; font-size: 36px; }
  </style>
  <rect x="0" y="0" width="400" height="400" fill="#FFFFFF" />
  <text x="50" y="100" fill="#222222" class="font1">Dream</text>
  <text x="120" y="100" fill="#222222" class="font1">Big</text>
  <text x="50" y="150" fill="#666666" class="font2">Don't watch the clock, do what it does. Keep going.</text>
  <text x="50" y="250" fill="#666666" class="font2">لا تنتظر الفرص، انشئها</text>
  <text x="120" y="350" fill="#222222" class="font1">Typography Matters</text>
</svg>