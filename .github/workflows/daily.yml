name: Print Shop Bot

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate and publish designs
        run: python src/main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_TOKEN }}

      - name: Commit designs and store
        run: |
          git config --local user.email "print-shop@github.com"
          git config --local user.name "Print Shop Bot"
          git add designs/ docs/
          git diff --staged --quiet || git commit -m "auto: new designs [$(date -u +'%Y-%m-%d')]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: generate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
